<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarbonFlow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }

    .navbar {
      background: #0C343D;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
      border-bottom: 2px solid #1F869B;
    }

    .navbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #ccffcc;
      font-size: 17px;
      font-weight: 500;
    }

    .logo-box {
      width: 36px;
      height: 36px;
      border: 1.5px dashed #1F869B;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #135260;
      text-align: center;
      line-height: 1.2;
    }

    .navbar-links {
      display: flex;
      gap: 2rem;
    }

    .navbar-links a {
      color: #ccffcc;
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.15s;
    }

    .navbar-links a:hover {
      background: rgba(57, 255, 106, 0.15);
      color: #1F869B;
    }

    .main {
      padding: 2rem;
      background: #fff;
      min-height: calc(100vh - 56px);
    }

    .card {
      background: #fff;
      border: 0.5px solid #d0d0d0;
      border-radius: 12px;
      padding: 1.5rem;
      max-width: 680px;
      margin: 0 auto;
    }

    .card-title {
      font-size: 15px;
      font-weight: 500;
      color: #111;
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 0.5px solid #e0e0e0;
    }

    .section-label {
      font-size: 12px;
      font-weight: 500;
      color: #0C343D;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 1.25rem 0 0.6rem;
    }

    .section-label:first-of-type { margin-top: 0; }

    .field { margin-bottom: 0.85rem; }

    .field label {
      display: block;
      font-size: 13px;
      color: #333;
      margin-bottom: 4px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 0.5px solid #ccc;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      color: #111;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: #1F869B;
      box-shadow: 0 0 0 2px rgba(57, 255, 106, 0.2);
    }

    .field textarea {
      resize: vertical;
      min-height: 72px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 1rem;
    }

    .tab {
      padding: 6px 16px;
      border-radius: 6px;
      border: 0.5px solid #ccc;
      background: #fff;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab.active {
      background: #0C343D;
      border-color: #135260;
      color: #ccffcc;
    }

    .tab:hover:not(.active) {
      border-color: #1F869B;
      color: #0C343D;
    }

    .section-block { display: none; }
    .section-block.visible { display: block; }

    .btn-calc {
      width: 100%;
      margin-top: 1.25rem;
      padding: 10px;
      background: #0C343D;
      color: #ccffcc;
      border: 1.5px solid #1F869B;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-calc:hover { background: #07222a; }

    .result-area {
      margin-top: 1rem;
      padding: 1rem;
      background: #f0fff0;
      border: 0.5px solid #1F869B;
      border-radius: 8px;
      font-size: 13px;
      color: #0C343D;
      display: none;
    }

    .result-area.visible { display: block; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-logo">
      <img src="./images/logo.png" alt="CarbonFlow" style="height: 32px;" />
      CarbonFlow
    </div>
    <div class="navbar-links">
      <a href="#">Resultados</a>
      <a href="#">Suporte</a>
      <a href="#">Config</a>
    </div>
  </nav>

  <div class="main">
    <div class="card">
      <div class="card-title">Calculadora de impacto ambiental por compra</div>

      <div class="section-label">Dados gerais da compra</div>

      <div class="field">
        <label for="tipo-produto">Tipo de produto</label>
        <select id="tipo-produto">
          <option value="">Selecione...</option>
          <option value="livro">Livro</option>
          <option value="eletronico">Eletrônico</option>
          <option value="roupa">Roupa</option>
          <option value="alimento">Alimento</option>
          <option value="outro">Outro</option>
        </select>
      </div>

      <div class="row">
        <div class="field">
          <label for="quantidade">Quantidade</label>
          <input type="number" id="quantidade" min="1" value="1" placeholder="1" />
        </div>
        <div class="field">
          <label for="peso">Peso estimado (kg)</label>
          <input type="number" id="peso" min="0" step="0.1" placeholder="0.5" />
        </div>
      </div>

      <div class="section-label">Meio de compra</div>

      <div class="tabs">
        <div class="tab active" onclick="switchTab('fisico', this)">Físico</div>
        <div class="tab" onclick="switchTab('digital', this)">Digital</div>
      </div>

      <div id="block-fisico" class="section-block visible">
        <div class="field">
          <label for="modal">Modal de entrega</label>
          <select id="modal">
            <option value="">Selecione...</option>
            <option value="moto">Moto</option>
            <option value="carro">Carro</option>
            <option value="caminhao">Caminhão</option>
            <option value="retirada">Retirada na loja</option>
            <option value="outro">Outro</option>
          </select>
        </div>
        <div class="field">
          <label for="distancia">Distância até o cliente (km)</label>
          <input type="number" id="distancia" min="0" placeholder="ex: 15" />
        </div>
        <div class="field">
          <label for="embalagem">Tipo de embalagem</label>
          <select id="embalagem">
            <option value="">Selecione...</option>
            <option value="sem">Sem embalagem</option>
            <option value="papelao">Caixa de papelão</option>
            <option value="plastico">Plástico</option>
            <option value="reciclado">Papel reciclado</option>
          </select>
        </div>
      </div>

      <div id="block-digital" class="section-block">
        <div class="field">
          <label for="tipo-digital">Tipo de produto digital</label>
          <select id="tipo-digital" onchange="verificarNaoDigital()">
            <option value="">Selecione...</option>
            <option value="nao-digital">Não-Digital</option>
            <option value="ebook">Ebook</option>
            <option value="software">Software</option>
            <option value="streaming">Streaming</option>
            <option value="musica">Música</option>
          </select>
        </div>

        <div id="campos-digital-puro">
          <div class="field">
            <label for="dispositivo">Dispositivo usado</label>
            <select id="dispositivo">
              <option value="">Selecione...</option>
              <option value="celular">Celular</option>
              <option value="computador">Computador</option>
              <option value="tablet">Tablet</option>
            </select>
          </div>
          <div class="field">
            <label for="tempo">Tempo estimado de uso (minutos)</label>
            <input type="number" id="tempo" min="0" placeholder="ex: 60" />
          </div>
        </div>

        <div id="campos-nao-digital" style="display: none;">
          <div class="field">
            <label for="modal-digital">Modal de entrega</label>
            <select id="modal-digital">
              <option value="">Selecione...</option>
              <option value="moto">Moto</option>
              <option value="carro">Carro</option>
              <option value="caminhao">Caminhão</option>
              <option value="retirada">Retirada na loja</option>
              <option value="outro">Outro</option>
            </select>
          </div>
          <div class="field">
            <label for="distancia-digital">Distância até o cliente (km)</label>
            <input type="number" id="distancia-digital" min="0" placeholder="ex: 15" />
          </div>
          <div class="field">
            <label for="embalagem-digital">Tipo de embalagem</label>
            <select id="embalagem-digital">
              <option value="">Selecione...</option>
              <option value="sem">Sem embalagem</option>
              <option value="papelao">Caixa de papelão</option>
              <option value="plastico">Plástico</option>
              <option value="reciclado">Papel reciclado</option>
            </select>
          </div>
        </div>
      </div>

      <div class="section-label">Observações (opcional)</div>
      <div class="field">
        <textarea id="observacoes" placeholder="Algum detalhe adicional sobre a compra..."></textarea>
      </div>

      <button class="btn-calc" onclick="calcular()">Calcular emissões</button>

      <div class="result-area" id="result-area">
        Campos preenchidos com sucesso. O cálculo real será processado pelo backend com base nos fatores de emissão cadastrados.
      </div>
    </div>
  </div>

  <script>
    function switchTab(tipo, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('block-fisico').classList.remove('visible');
      document.getElementById('block-digital').classList.remove('visible');
      document.getElementById('block-' + tipo).classList.add('visible');
    }

    function verificarNaoDigital() {
      const valor = document.getElementById('tipo-digital').value;
      const camposDigital = document.getElementById('campos-digital-puro');
      const camposNaoDigital = document.getElementById('campos-nao-digital');

      if (valor === 'nao-digital') {
        camposDigital.style.display = 'none';
        camposNaoDigital.style.display = 'block';
      } else {
        camposDigital.style.display = 'block';
        camposNaoDigital.style.display = 'none';
      }
    }

    function calcular() {
      document.getElementById('result-area').classList.add('visible');
    }
  </script>

</body>
</html>
